<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wanderlog</title>

  <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

  <header>
    <h1>Wanderlog</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Destinations</a>
      <a href="#">About</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <h2>🌸Explore The World🌸</h2>

      <p>
        Discover beautiful places and create unforgettable memories✨
      </p>

      <button>Start Exploring</button>
    </section>

  </main>
 <section class="trip-form">

<h2>🌷 Plan Your Next Trip 🌷</h2>

<form id="tripForm">
  
<label for="image">📷 Trip Photo</label>

<input
type="file"
id="image"
accept="image/*">

<img
id="preview"
src=""
alt="Preview"
style="display:none;">
<input
type="text"
id="title"
placeholder="Trip Title">

<input
type="text"
id="destination"
placeholder="Destination">

<input
type="date"
id="date">

<textarea
id="notes"
placeholder="Write your memories..."></textarea>

<button type="submit">
💕 Add Trip
</button>

</form>

</section>

<section>

<h2>My Trips ✨</h2>

<div id="tripList">

</div>

</section>
  <footer>
    <p>© 2026 Wanderlog</p>
  </footer>

</body>

</html>
